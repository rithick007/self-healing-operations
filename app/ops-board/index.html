<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Self-Healing Operations — YesMadam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f4f2f8; --card: #ffffff; --ink: #181320; --muted: #756b85; --line: #ece7f2;
        --brand: #e6007e; --brand2: #9b1fb0; --good: #1e9e6a; --good-soft: #e3f6ed;
        --warn: #c98a00; --warn-soft: #fbf2da; --bad: #d23b3b; --bad-soft: #fbe6e6;
        --chip: #f3eff8; --sans: "Plus Jakarta Sans", -apple-system, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.5; }
      .wrap { max-width: 1220px; margin: 0 auto; padding: clamp(.9rem, 2.5vw, 1.8rem); }
      .top { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
      .brand { display: flex; align-items: center; gap: .7rem; }
      .logo { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--brand), var(--brand2)); color: #fff; display: grid; place-items: center; font-weight: 800; }
      .eyebrow { font-size: .68rem; letter-spacing: .14em; text-transform: uppercase; color: var(--brand); font-weight: 700; }
      h1 { font-size: 1.3rem; font-weight: 800; margin: 0; letter-spacing: -.02em; }
      .pill { display: inline-flex; align-items: center; gap: .45rem; font-size: .76rem; color: var(--muted); background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: .4rem .8rem; }
      .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--good); animation: pulse 2.2s infinite; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(30,158,106,.5); } 70% { box-shadow: 0 0 0 7px rgba(30,158,106,0); } 100% { box-shadow: 0 0 0 0 rgba(30,158,106,0); } }
      button { font: inherit; cursor: pointer; }
      .btn { border: 1px solid var(--line); background: var(--card); color: var(--ink); border-radius: 9px; padding: .45rem .8rem; font-weight: 600; font-size: .82rem; transition: .15s; }
      .btn:hover { border-color: var(--brand); color: var(--brand); }
      .btn.good { background: var(--good); color: #fff; border-color: var(--good); }
      .btn.good:hover { filter: brightness(1.07); color: #fff; }
      .btn.bad { background: var(--card); color: var(--bad); border-color: var(--bad-soft); }
      .btn.bad:hover { background: var(--bad); color: #fff; }
      .btn.sm { padding: .3rem .6rem; font-size: .76rem; }
      .btn:disabled { opacity: .5; cursor: default; }
      /* HERO */
      .hero { background: linear-gradient(125deg, #e6007e 0%, #9b1fb0 60%, #6d28d9 100%); border-radius: 20px; padding: 1.3rem 1.4rem; color: #fff; box-shadow: 0 18px 44px rgba(150, 20, 100, .22); margin-bottom: 1rem; }
      .hero .hl { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
      .hero h2 { margin: 0; font-size: 1.05rem; font-weight: 700; }
      .hero .sub { opacity: .85; font-size: .8rem; margin-top: .15rem; }
      .hero .cta { background: #fff; color: var(--brand); border: none; border-radius: 11px; padding: .65rem 1.1rem; font-weight: 800; font-size: .9rem; box-shadow: 0 6px 18px rgba(0,0,0,.16); }
      .hero .cta:hover { transform: translateY(-1px); }
      .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: .7rem; margin-top: 1.1rem; }
      .kpi { background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.18); border-radius: 14px; padding: .8rem .9rem; backdrop-filter: blur(4px); }
      .kpi .n { font-size: 1.65rem; font-weight: 800; letter-spacing: -.02em; line-height: 1; }
      .kpi .l { font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; opacity: .85; margin-top: .35rem; }
      .kpi.alarm { background: rgba(255,90,90,.22); border-color: rgba(255,150,150,.4); }
      .compare { margin-top: 1rem; display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; font-size: .8rem; }
      .compare .b { background: rgba(255,255,255,.14); border-radius: 8px; padding: .35rem .7rem; }
      .compare .arrow { opacity: .8; font-weight: 800; }
      .cols { display: grid; grid-template-columns: 1.35fr 1fr; gap: 1rem; align-items: start; }
      @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }
      .panel { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 1.05rem 1.15rem; margin-bottom: 1rem; }
      .panel h2 { font-size: .95rem; margin: 0 0 .1rem; display: flex; align-items: center; gap: .5rem; }
      .panel .cap { color: var(--muted); font-size: .77rem; margin: 0 0 .85rem; }
      .count { background: var(--chip); color: var(--muted); font-size: .7rem; font-weight: 700; padding: .1rem .5rem; border-radius: 999px; }
      .bk { display: flex; align-items: center; gap: .7rem; padding: .65rem 0; border-top: 1px solid var(--line); }
      .bk:first-of-type { border-top: none; }
      .bk .info { flex: 1; min-width: 0; }
      .bk .who { font-weight: 700; display: flex; align-items: center; gap: .5rem; }
      .bk .meta { color: var(--muted); font-size: .77rem; margin-top: .1rem; }
      .badge { font-size: .66rem; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; padding: .2rem .5rem; border-radius: 999px; white-space: nowrap; }
      .b-scheduled { background: var(--chip); color: var(--muted); } .b-at_risk { background: var(--warn-soft); color: var(--warn); }
      .b-reassigned { background: var(--good-soft); color: var(--good); } .b-escalated { background: var(--bad-soft); color: var(--bad); }
      .b-completed, .b-cancelled { background: var(--chip); color: var(--muted); }
      .risk { font-size: .66rem; font-weight: 800; padding: .15rem .45rem; border-radius: 6px; }
      .r-critical { background: var(--bad-soft); color: var(--bad); } .r-at_risk { background: var(--warn-soft); color: var(--warn); } .r-resilient { background: var(--good-soft); color: var(--good); }
      .appr { border: 1px solid var(--warn-soft); background: var(--warn-soft); border-radius: 12px; padding: .8rem .9rem; margin-bottom: .7rem; }
      .appr .h { display: flex; justify-content: space-between; gap: .5rem; align-items: baseline; }
      .appr .amt { font-weight: 800; font-size: 1.15rem; }
      .appr .rsn { color: #7a6020; font-size: .79rem; margin: .35rem 0 .7rem; }
      .appr .acts { display: flex; gap: .5rem; }
      .empty { color: var(--muted); font-size: .85rem; padding: .6rem 0; }
      .tl .ev { position: relative; padding: .45rem 0 .45rem 1rem; border-left: 2px solid var(--line); margin-left: .2rem; }
      .tl .ev::before { content: ""; position: absolute; left: -5px; top: .75rem; width: 8px; height: 8px; border-radius: 50%; background: var(--brand); }
      .tl .ev .e { font-weight: 700; font-size: .76rem; text-transform: capitalize; }
      .tl .ev .d { color: var(--muted); font-size: .77rem; }
      .tl .ev .t { color: var(--muted); font-size: .67rem; margin-top: .1rem; }
      .center { min-height: 80dvh; display: grid; place-items: center; text-align: center; }
      .toast { position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: .6rem 1.1rem; border-radius: 10px; font-size: .85rem; opacity: 0; transition: .25s; pointer-events: none; z-index: 9; }
      .toast.show { opacity: 1; }
      .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: rot .7s linear infinite; vertical-align: -2px; }
      @keyframes rot { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app"><div class="center"><p>Loading operations command center…</p></div></div>
    <div class="toast" id="toast"></div>
    <script>
      (function () {
        var cfg = window.__LEMMA_CONFIG__ || {};
        var base = (cfg.apiUrl || window.location.origin).replace(/\/$/, "");
        var s = document.createElement("script");
        s.src = base + "/public/sdk/lemma-client.js";
        s.onload = boot; s.onerror = function () { fatal("Couldn't load the Lemma SDK from " + s.src); };
        document.head.appendChild(s);
      })();

      var client, STATE = {};
      function $(id) { return document.getElementById(id); }
      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }
      function listOf(r) { return (r && (r.items || r.data)) || (Array.isArray(r) ? r : []); }
      function money(n) { return "₹" + Number(n || 0).toLocaleString("en-IN"); }
      function fatal(m) { $("app").innerHTML = '<div class="center"><div><h1>⚠ Error</h1><p>' + esc(m) + "</p></div></div>"; }
      function toast(m) { var t = $("toast"); t.textContent = m; t.classList.add("show"); clearTimeout(t._x); t._x = setTimeout(function () { t.classList.remove("show"); }, 2400); }
      function ago(iso) { if (!iso) return ""; var s = (Date.now() - new Date(iso).getTime()) / 1000; if (s < 60) return "just now"; if (s < 3600) return Math.floor(s / 60) + "m ago"; if (s < 86400) return Math.floor(s / 3600) + "h ago"; return Math.floor(s / 86400) + "d ago"; }
      function call(name, input) { return client.functions.runs.create(name, { input: input }); }

      async function boot() {
        try {
          client = new window.LemmaClient.LemmaClient();
          var auth = await client.initialize();
          if (auth.status !== "authenticated") return signIn();
          STATE.user = auth.user;
          await refresh();
        } catch (e) { fatal((e && e.message) || "Something went wrong."); }
      }
      function signIn() {
        $("app").innerHTML = '<div class="center"><div><div class="eyebrow">YesMadam Ops</div><h1>Self-Healing Operations</h1><p style="color:var(--muted)">Sign in to open the command center.</p><button class="btn good" id="si" style="margin-top:1rem">Sign in</button></div></div>';
        $("si").onclick = function () { client.auth.redirectToAuth(); };
      }

      async function refresh() {
        var r = await Promise.all([
          client.records.list("bookings", { limit: 100 }),
          client.records.list("beauticians", { limit: 100 }),
          client.records.list("comp_ledger", { limit: 100 }),
          client.records.list("recovery_log", { limit: 100 }),
        ]);
        STATE.bookings = listOf(r[0]); STATE.pros = listOf(r[1]);
        STATE.comps = listOf(r[2]); STATE.logs = listOf(r[3]);
        render();
      }
      function proName(id) { var p = (STATE.pros || []).find(function (x) { return x.id === id; }); return p ? p.name : "—"; }
      function bk(id) { return (STATE.bookings || []).find(function (x) { return x.id === id; }); }

      // --- Proactive risk: backup depth = available qualified pros that could cover ---
      function backupDepth(b) {
        return (STATE.pros || []).filter(function (p) {
          if (p.status !== "active" || p.is_available !== true) return false;
          if (b.skill_required && (p.skills || []).indexOf(b.skill_required) < 0) return false;
          if (p.max_jobs_per_day && (p.jobs_today || 0) >= p.max_jobs_per_day) return false;
          return true;
        }).length;
      }
      function tier(d) { return d === 0 ? "critical" : d <= 2 ? "at_risk" : "resilient"; }

      function render() {
        var b = STATE.bookings || [], comps = STATE.comps || [], logs = STATE.logs || [];
        var open = b.filter(function (x) { return x.status === "scheduled" || x.status === "at_risk"; });
        var shielded = open.filter(function (x) { return backupDepth(x) >= 1; });
        var critical = open.filter(function (x) { return backupDepth(x) === 0; });
        var coverage = open.length ? Math.round((shielded.length / open.length) * 100) : 100;
        var revShielded = shielded.reduce(function (a, x) { return a + Number(x.price || 0); }, 0);
        var recovered = b.filter(function (x) { return x.status === "reassigned"; }).length;
        var pending = comps.filter(function (c) { return c.status === "pending"; });
        var issued = comps.filter(function (c) { return c.status === "issued"; }).reduce(function (a, c) { return a + Number(c.amount || 0); }, 0);
        var who = STATE.user && (STATE.user.name || STATE.user.email) || "";

        var h = '<div class="wrap"><div class="top"><div class="brand"><div class="logo">YM</div><div><div class="eyebrow">YesMadam Operations</div><h1>Self-Healing Operations</h1></div></div>' +
          '<div style="display:flex;gap:.6rem;align-items:center;flex-wrap:wrap"><span class="pill"><span class="pip"></span>live' + (who ? " · " + esc(who) : "") + '</span><button class="btn" id="reset">↺ Reset</button></div></div>';

        // HERO
        h += '<div class="hero"><div class="hl"><div><h2>Today\'s resilience</h2><div class="sub">Real-time coverage across every booking — the agent keeps the day whole.</div></div>' +
          '<button class="cta" id="simday">▶ Simulate the full day</button></div>' +
          '<div class="kpis">' +
          kpi(coverage + "%", "Coverage", false) +
          kpi(money(revShielded), "Revenue shielded", false) +
          kpi(critical.length, "Critical gaps", critical.length > 0) +
          kpi(recovered, "Auto-recovered", false) +
          kpi(money(issued), "Comp issued", false) + "</div>" +
          '<div class="compare"><span class="b">Manual dispatch ≈ 11 min · ~40% slots lost</span><span class="arrow">→</span><span class="b">AI recovery &lt; 10 sec · ' + coverage + '% covered</span></div></div>';

        h += '<div class="cols"><div>';
        // Risk radar + board
        h += '<div class="panel"><h2>🛰 Risk radar &amp; live board <span class="count">' + b.length + '</span></h2>' +
          '<p class="cap">Bookings ranked by cancellation exposure (backup depth). Critical = no qualified pro free to cover.</p>';
        var sorted = b.slice().sort(function (x, y) {
          var rx = (x.status === "scheduled" || x.status === "at_risk") ? backupDepth(x) : 99;
          var ry = (y.status === "scheduled" || y.status === "at_risk") ? backupDepth(y) : 99;
          return rx - ry;
        });
        h += sorted.map(bookingRow).join("") || '<div class="empty">No bookings.</div>';
        h += "</div></div><div>";
        // Approval queue
        h += '<div class="panel"><h2>⚠ Approval queue <span class="count">' + pending.length + '</span></h2>' +
          '<p class="cap">Money decisions need a human. The agent recommends — you decide.</p>';
        h += pending.map(apprCard).join("") || '<div class="empty">Nothing waiting. The floor is healthy. ✓</div>';
        h += "</div>";
        // Timeline
        h += '<div class="panel"><h2>Recovery timeline</h2><p class="cap">Every action, agent and human.</p><div class="tl">';
        var recent = logs.slice().sort(function (x, y) { return String(y.created_at).localeCompare(String(x.created_at)); }).slice(0, 14);
        h += recent.map(function (l) { return '<div class="ev"><div class="e">' + esc((l.event || "").replace(/_/g, " ")) + '</div><div class="d">' + esc(l.detail || "") + '</div><div class="t">' + esc(ago(l.created_at)) + " · " + esc(l.actor) + "</div></div>"; }).join("") || '<div class="empty">No activity yet.</div>';
        h += "</div></div></div></div></div>";

        $("app").innerHTML = h; wire();
      }

      function kpi(n, l, alarm) { return '<div class="kpi' + (alarm ? " alarm" : "") + '"><div class="n">' + esc(n) + '</div><div class="l">' + esc(l) + "</div></div>"; }

      function bookingRow(x) {
        var openState = x.status === "scheduled" || x.status === "at_risk";
        var depth = backupDepth(x), t = tier(depth);
        var riskBadge = openState ? '<span class="risk r-' + t + '">' + (t === "critical" ? "no backup" : depth + " backup" + (depth === 1 ? "" : "s")) + "</span>" : "";
        var assigned = x.status === "reassigned" ? ' · now <b>' + esc(proName(x.assigned_pro_id)) + "</b>" : "";
        var time = x.scheduled_at ? new Date(x.scheduled_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";
        return '<div class="bk"><div class="info"><div class="who">' + esc(x.customer_name) + " " + riskBadge + "</div>" +
          '<div class="meta">' + esc(x.service) + " · " + esc(x.area) + " · " + esc(time) + assigned + "</div></div>" +
          '<span class="badge b-' + esc(x.status) + '">' + esc((x.status || "").replace(/_/g, " ")) + "</span>" +
          (openState ? '<button class="btn sm" data-recover="' + esc(x.id) + '">Cancel → recover</button>' : "") + "</div>";
      }
      function apprCard(c) {
        var booking = bk(c.booking_id), name = booking ? booking.customer_name : "Booking";
        return '<div class="appr"><div class="h"><div><b>' + esc(name) + "</b> · " + esc(c.type) + '</div><div class="amt">' + money(c.amount) + "</div></div>" +
          '<div class="rsn">' + esc(c.reason || "") + "</div>" +
          '<div class="acts"><button class="btn good sm" data-approve="' + esc(c.id) + '">✓ Approve</button><button class="btn bad sm" data-reject="' + esc(c.id) + '">✕ Reject</button></div></div>';
      }

      // --- Recovery runs client-side over the fast datastore API (~2s),
      // --- not the slow function runtime. Same logic as the run_recovery fn.
      function haversine(a, b, c, d) {
        if ([a, b, c, d].some(function (v) { return v == null; })) return 8;
        var r = 6371, dl = (c - a) * Math.PI / 180, dn = (d - b) * Math.PI / 180;
        var x = Math.sin(dl / 2) ** 2 + Math.cos(a * Math.PI / 180) * Math.cos(c * Math.PI / 180) * Math.sin(dn / 2) ** 2;
        return Math.round(2 * r * Math.asin(Math.sqrt(x)) * 100) / 100;
      }
      function bestPro(b) {
        var best = null, bs = -1, eta = 0;
        (STATE.pros || []).forEach(function (p) {
          if (p.status !== "active" || p.is_available !== true) return;
          if (b.skill_required && (p.skills || []).indexOf(b.skill_required) < 0) return;
          if (p.max_jobs_per_day && (p.jobs_today || 0) >= p.max_jobs_per_day) return;
          var dist = haversine(b.lat, b.lng, p.lat, p.lng);
          var score = 1 / (1 + dist) + (p.rating || 0) / 5 * 0.6;
          if (score > bs) { best = p; bs = score; eta = Math.round(15 + 3 * dist); }
        });
        return best ? { pro: best, eta: eta } : null;
      }
      // The SDK's records.update sends the bulk endpoint mode=undefined → server 422
      // ("mode must be USER/ADMIN") with no passthrough, so writes go through a raw
      // authenticated POST (same lemma_token bearer the SDK uses) with mode=USER.
      function apiPost(pathQ, body) {
        var cfg = window.__LEMMA_CONFIG__ || {};
        var base = (cfg.apiUrl || location.origin).replace(/\/$/, "");
        var token = null; try { token = localStorage.getItem("lemma_token"); } catch (e) {}
        var headers = { "Content-Type": "application/json" };
        if (token) headers["Authorization"] = "Bearer " + token;
        return fetch(base + "/pods/" + cfg.podId + pathQ, {
          method: "POST", headers: headers, credentials: "include", body: JSON.stringify(body)
        }).then(function (r) {
          if (!r.ok) return r.text().then(function (t) { throw new Error("HTTP " + r.status + " " + t.slice(0, 100)); });
          return r.json().catch(function () { return {}; });
        });
      }
      function rcreate(t, obj) { return apiPost("/datastore/tables/" + t + "/records/bulk/create", { records: [obj] }); }
      function rupdate(t, id, fields) { return apiPost("/datastore/tables/" + t + "/records/bulk/update?mode=USER", { records: [Object.assign({ id: id }, fields)] }); }
      function rlog(id, event, actor, detail) { return rcreate("recovery_log", { booking_id: id, event: event, actor: actor, detail: detail }); }

      async function recoverBooking(b) {
        var m = bestPro(b);
        if (!m) {
          await rupdate("bookings", b.id, { status: "escalated" });
          await Promise.all([
            rcreate("comp_ledger", { booking_id: b.id, type: "refund", amount: b.price || 0, reason: "No available " + (b.skill_required || "") + " professional.", recommended_by: "app", status: "pending" }),
            rlog(b.id, "escalated", "agent", "No replacement found. Full refund queued for approval."),
          ]);
          return;
        }
        var pro = m.pro, eta = m.eta, price = b.price || 0;
        var msg = "Hi " + b.customer_name + ", your " + b.service + " is confirmed. Your original professional became unavailable, so we have arranged " + pro.name + " to arrive in about " + eta + " minutes. — YesMadam";
        var comp = null;
        if (eta > 15) { var pct = eta <= 30 ? 0.10 : 0.20; comp = { amount: Math.round(price * pct), reason: "~" + eta + "-min delay — " + (pct * 100) + "% goodwill discount." }; }
        var ops = [
          rupdate("bookings", b.id, { assigned_pro_id: pro.id, status: "reassigned" }),
          rupdate("beauticians", pro.id, { jobs_today: (pro.jobs_today || 0) + 1 }),
          rlog(b.id, "reassigned", "agent", "Reassigned to " + pro.name + " (ETA ~" + eta + " min)."),
          rlog(b.id, "customer_notified", "agent", msg),
        ];
        if (comp) {
          ops.push(rcreate("comp_ledger", { booking_id: b.id, type: "discount", amount: comp.amount, reason: comp.reason, recommended_by: "app", status: "pending" }));
          ops.push(rlog(b.id, "comp_recommended", "agent", comp.reason));
        } else {
          ops.push(rlog(b.id, "resolved", "agent", "Recovered within grace window — no comp needed."));
        }
        await Promise.all(ops);
      }

      async function decideComp(compId, approved) {
        var c = (STATE.comps || []).find(function (x) { return x.id === compId; }) || {};
        await Promise.all([
          rupdate("comp_ledger", compId, { status: approved ? "issued" : "rejected", decided_by: "operator" }),
          rlog(c.booking_id, approved ? "comp_approved" : "comp_rejected", "human", (c.type || "comp") + " of " + Math.round(c.amount || 0) + " INR " + (approved ? "issued" : "rejected") + " by operator."),
        ]);
      }

      function wire() {
        $("reset").onclick = function () { act(this, function () { return call("reset_demo", { confirm: true }); }, "Demo reset (takes a few seconds)"); };
        $("simday").onclick = simulateDay;
        document.querySelectorAll("[data-recover]").forEach(function (btn) { btn.onclick = function () { act(btn, function () { return recoverBooking(bk(btn.getAttribute("data-recover"))); }, "Recovered"); }; });
        document.querySelectorAll("[data-approve]").forEach(function (btn) { btn.onclick = function () { act(btn, function () { return decideComp(btn.getAttribute("data-approve"), true); }, "Approved"); }; });
        document.querySelectorAll("[data-reject]").forEach(function (btn) { btn.onclick = function () { act(btn, function () { return decideComp(btn.getAttribute("data-reject"), false); }, "Rejected"); }; });
      }

      async function act(btn, fn, okMsg) {
        var label = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
        try { await fn(); toast(okMsg); await refresh(); }
        catch (e) { btn.disabled = false; btn.innerHTML = label; toast("Error: " + ((e && e.message) || "failed")); }
      }

      // The wow: handle a whole day of cancellations in one click (client-side, fast).
      async function simulateDay() {
        var btn = $("simday");
        var open = (STATE.bookings || []).filter(function (x) { return x.status === "scheduled" || x.status === "at_risk"; });
        if (!open.length) { toast("No open bookings — reset first."); return; }
        btn.disabled = true; var done = 0;
        for (var i = 0; i < open.length; i++) {
          btn.innerHTML = "Recovering… " + (i + 1) + "/" + open.length;
          try { await recoverBooking(open[i]); done++; } catch (e) {}
        }
        btn.innerHTML = "▶ Simulate the full day"; btn.disabled = false;
        toast("Handled " + done + " bookings in seconds.");
        await refresh();
      }
    </script>
  </body>
</html>
